name: Deploy Infra + App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurar AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS }}
          aws-region: us-east-1

      # 3. Instalar Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      # 4. Inicializar Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: infra/

      # 5. Crear infraestructura
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: infra/

      # 6. Obtener nombre del bucket
      - name: Get bucket name
        id: tf_output
        run: |
          BUCKET=$(terraform output -raw bucket_name)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
        working-directory: infra/

      # 7. Subir app a S3
      - name: Deploy to S3
        run: aws s3 sync app/ s3://${{ steps.tf_output.outputs.bucket }} --delete

      # 8. Mostrar URL
      - name: Show Website URL
        run: terraform output website_url
        working-directory: infra/